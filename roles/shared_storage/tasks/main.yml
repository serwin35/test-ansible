---
- name: Create shared directory
  file:
    path: "{{ shared_dir }}"
    state: directory
    owner: nobody
    group: nogroup
    mode: "0777"

# NFS zastąpiony przez VirtIO FS (virtiofs) — Linux/FreeBSD montują bezpośrednio przez hypervisor
# Samba zostaje — Windows używa SMB natywnie bez dodatkowych sterowników

- name: Install Samba (SMB for Windows)
  apt:
    name: samba
    state: present
    update_cache: true

- name: Deploy smb.conf
  template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart smbd

- name: Enable and start Samba
  service:
    name: smbd
    state: started
    enabled: true

- name: Allow SMB (LAN + VLAN)
  ufw:
    rule: allow
    port: "445"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ shared_nfs_clients }}"
